name: Build and Push Docker Images

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: furrysalamander

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bar-mods-streamlit
            context: .
            dockerfile: docker/streamlit/Dockerfile
          - image: bar-mods-discord-bot
            context: .
            dockerfile: docker/discord-bot/Dockerfile
          - image: bar-mods-opencode
            context: docker/opencode
            dockerfile: docker/opencode/Dockerfile
            needs-opencode: "true"
          - image: bar-python-sandbox
            context: docker/python-sandbox
            dockerfile: docker/python-sandbox/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download opencode binary (ARM64 musl)
        if: matrix.needs-opencode == 'true'
        run: |
          curl -fsSL -o /tmp/opencode.tar.gz \
            https://github.com/anomalyco/opencode/releases/latest/download/opencode-linux-arm64-musl.tar.gz
          tar xzf /tmp/opencode.tar.gz -C docker/opencode/
          file docker/opencode/opencode

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}